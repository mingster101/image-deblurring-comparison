# general settings
name: test_DiffIRS2_finetune
model_type: DiffIRS2Model
scale: 1
num_gpu: 1
manual_seed: 0

datasets:
  val_1:
    name: GoPro
    type: DeblurPairedDataset
    dataroot_gt: C:/Users/MM-417/Desktop/Punyamingsterplsjgndisentuh/EksplorasiSkripsi/Restormer/Motion_Deblurring/Datasets/GOPRO_Large_flat/test/sharp
    dataroot_lq: C:/Users/MM-417/Desktop/Punyamingsterplsjgndisentuh/EksplorasiSkripsi/Restormer/Motion_Deblurring/Datasets/GOPRO_Large_flat/test/blur
    io_backend:
      type: disk

network_g:
  type: DiffIRS2
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias
  n_denoise_res: 1
  linear_start: 0.1
  linear_end: 0.99
  timesteps: 4

network_S1:
  type: DiffIRS1
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias

path:
  pretrain_network_g: C:/Users/MM-417/Desktop/Punyamingsterplsjgndisentuh/EksplorasiSkripsi/DiffIR/DiffIR-demotionblur/experiments/train_DiffIRS2_FT_LR5e5/models/net_g_40000.pth
  pretrain_network_S1: C:/Users/MM-417/Desktop/Punyamingsterplsjgndisentuh/EksplorasiSkripsi/DiffIR/DiffIR-demotionblur/DiffIR/weights/Deblurring-DiffIRS1.pth
  param_key_g: params_ema
  strict_load_g: False
  ignore_resume_networks: network_S1

val:
  save_img: True
  suffix: ~
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: False
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: False