# general settings
name: train_DiffIRS2_FT_LR5e5
model_type: DiffIRS2Model
scale: 1
num_gpu: 1
manual_seed: 0

datasets:
  train:
    name: TrainSet
    type: DeblurPairedDataset
    dataroot_gt: C:\Users\MM-417\Desktop\Punyamingsterplsjgndisentuh\EksplorasiSkripsi\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\train\sharp
    dataroot_lq: C:\Users\MM-417\Desktop\Punyamingsterplsjgndisentuh\EksplorasiSkripsi\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\train\blur
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    mini_batch_sizes: [1]
    iters: [50000]
    gt_size: 256
    gt_sizes: [256]
    use_shuffle: true
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: DeblurPairedDataset
    dataroot_gt: C:\Users\MM-417\Desktop\Punyamingsterplsjgndisentuh\EksplorasiSkripsi\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\test\sharp
    dataroot_lq: C:\Users\MM-417\Desktop\Punyamingsterplsjgndisentuh\EksplorasiSkripsi\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\test\blur
    io_backend:
      type: disk

network_g:
  type: DiffIRS2
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias
  n_denoise_res: 1
  linear_start: 0.1
  linear_end: 0.99
  timesteps: 4

network_S1:
  type: DiffIRS1
  n_encoder_res: 5
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [3,5,6,6]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias

path:
  pretrain_network_g: DiffIR/weights/Deblurring-DiffIRS2.pth
  pretrain_network_S1: DiffIR/weights/Deblurring-DiffIRS1.pth
  param_key_g: params_ema
  strict_load_g: False
  resume_state: ~
  ignore_resume_networks: network_S1

train:
  ema_decay: 0.999
  optim_g:
m
    lr: !!float 5e-5
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [40000]
    gamma: 0.5
  encoder_iter: 20000
  total_iter: 50000
  lr_encoder: !!float 5e-5
  lr_sr: !!float 5e-5
  gamma_encoder: 0.1
  gamma_sr: 0.5
  lr_decay_encoder: 20000
  lr_decay_sr: 25000
  warmup_iter: -1
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  kd_opt:
    type: KDLoss
    loss_weight: 1
    temperature: 0.15

val:
  window_size: 8
  val_freq: !!float 5e3
  save_img: False
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
