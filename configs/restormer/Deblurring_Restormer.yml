# general settings
name: Deblurring_Restormer_Finetune
model_type: ImageCleanModel
scale: 1
num_gpu: 1
manual_seed: 100

datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: ./Motion_Deblurring/Datasets/GOPRO_Large_flat/train/sharp
    dataroot_lq: ./Motion_Deblurring/Datasets/GOPRO_Large_flat/train/blur
    geometric_augs: true
    filename_tmpl: '{}'
    io_backend:
      type: disk
    use_shuffle: true
    num_worker_per_gpu: 1
    batch_size_per_gpu: 1
    mini_batch_sizes: [1]
    iters: [50000]
    gt_size: 256
    gt_sizes: [256]
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: C:\Users\MM-461\Documents\GitHub\Image_Deblurring\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\test\sharp
    dataroot_lq: C:\Users\MM-461\Documents\GitHub\Image_Deblurring\Restormer\Motion_Deblurring\Datasets\GOPRO_Large_flat\test\blur
    io_backend:
      type: disk

network_g:
  type: Restormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False

path:
  pretrain_network_g: ./Motion_Deblurring/pretrained_models/motion_deblurring.pth
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 50000
  warmup_iter: -1
  use_grad_clip: true
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [50000]
    restart_weights: [1]
    eta_mins: [0.000001]
  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true
  optim_g:
    type: AdamW
    lr: !!float 1e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

val:
  window_size: 8
  val_freq: !!float 4e3
  save_img: false
  rgb2bgr: true
  use_image: true
  max_minibatch: 8
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

logger:
  print_freq: 1000
  save_checkpoint_freq: !!float 4e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500